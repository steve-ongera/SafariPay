<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ─────────────────────────────────────────────────────────── -->
    <title>SafariPay — Smart Money for Africa</title>
    <meta name="description"
          content="SafariPay is Africa's next-generation financial super-platform. Send money, save smarter, access micro-loans, and grow your wealth — all in one place." />
    <meta name="keywords"
          content="SafariPay, mobile money Kenya, microfinance Africa, cross-border payments, micro-loans, savings, fintech Africa, mobile banking" />
    <meta name="author" content="SafariPay" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://safaripay.africa/" />

    <!-- ── Open Graph ──────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://safaripay.africa/" />
    <meta property="og:title"       content="SafariPay — Smart Money for Africa" />
    <meta property="og:description" content="The intelligent, inclusive financial platform connecting Africa. Send, save, borrow, grow." />
    <meta property="og:image"       content="https://safaripay.africa/og-image.png" />
    <meta property="og:locale"      content="en_KE" />

    <!-- ── Twitter Card ────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@safaripay" />
    <meta name="twitter:title"       content="SafariPay — Smart Money for Africa" />
    <meta name="twitter:description" content="Payments · Savings · Micro-Loans · AI Insights" />
    <meta name="twitter:image"       content="https://safaripay.africa/og-image.png" />

    <!-- ── Schema.org structured data ─────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "SafariPay",
      "url": "https://safaripay.africa",
      "description": "Next-generation microfinance and mobile banking platform for Africa",
      "areaServed": "Africa",
      "currenciesAccepted": "KES, UGX, TZS, NGN, GHS, USD"
    }
    </script>

    <!-- ── Bootstrap Icons ─────────────────────────────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- ── Google Fonts ────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />

    <!-- ── Favicon ─────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0a1628" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
